name: Claude Code Agent

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      prompt:
        description: 'Prompt for Claude'
        required: true
        type: string
      branch:
        description: 'Branch to check out (default: main)'
        required: false
        default: 'main'
        type: string

jobs:
  claude-tag:
    if: >-
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install
      - uses: anthropics/claude-code-action@beta
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          model: claude-sonnet-4-6
          timeout_minutes: 30

  claude-agent:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      actions: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || 'main' }}
          fetch-depth: 1
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install

      - id: claude
        continue-on-error: true
        uses: anthropics/claude-code-action@beta
        env:
          GH_DISPATCH_TOKEN: ${{ secrets.GH_DISPATCH_TOKEN }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          direct_prompt: ${{ github.event.inputs.prompt }}
          mode: agent
          model: claude-sonnet-4-6
          allowed_tools: Bash,Edit,MultiEdit,Glob,Grep,LS,Read,Write,TodoWrite
          timeout_minutes: 30
          max_turns: 50

      - name: Build (post-agent validation)
        if: steps.claude.outcome == 'success'
        run: npm run build

      - name: Handle spending cap
        if: steps.claude.outcome == 'failure'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_DISPATCH_TOKEN: ${{ secrets.GH_DISPATCH_TOKEN }}
          BRANCH: ${{ github.event.inputs.branch || 'main' }}
          PROMPT: ${{ github.event.inputs.prompt || '' }}
        run: |
          STEP_OUTPUT="${{ steps.claude.outputs.output }}"
          if echo "$PROMPT" | grep -qF "You are a code reviewer"; then exit 0; fi
          ISSUE_N=$(echo "$BRANCH" | grep -oP 'feature/issue-\K[0-9]+' || true)
          [ -z "$ISSUE_N" ] && ISSUE_N=$(echo "$PROMPT" | grep -oP 'Issue #\K[0-9]+' | head -1 || true)
          [ -z "$ISSUE_N" ] && exit 0
          if ! echo "$STEP_OUTPUT" | grep -q "Spending cap reached resets"; then
            GH_TOKEN="$GH_DISPATCH_TOKEN" gh issue edit "$ISSUE_N" \
              --repo strata-reports-ai/orchestrator-strata-reports \
              --remove-label in-progress --add-label ready
            exit 1
          fi
          RESET_ISO=$(date -u -d "+8 hours" +%Y-%m-%dT%H:%M:%SZ)
          GH_TOKEN="$GH_DISPATCH_TOKEN" gh issue edit "$ISSUE_N" \
            --repo strata-reports-ai/orchestrator-strata-reports --add-label "cap-wait"
          GH_TOKEN="$GH_DISPATCH_TOKEN" gh issue comment "$ISSUE_N" \
            --repo strata-reports-ai/orchestrator-strata-reports \
            --body "Spending cap reached. RESET_ISO: ${RESET_ISO}"

      - name: Trigger code review for any new PR
        if: steps.claude.outcome == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_DISPATCH_TOKEN: ${{ secrets.GH_DISPATCH_TOKEN }}
          PROMPT: ${{ github.event.inputs.prompt || '' }}
        run: |
          if echo "$PROMPT" | grep -qF "You are a code reviewer"; then exit 0; fi
          ISSUE_N=$(echo "$PROMPT" | grep -oP 'Issue #\K[0-9]+' | head -1 || true)
          PR_DATA=""
          if [ -n "$ISSUE_N" ]; then
            PR_DATA=$(gh pr list --base main --state open \
              --json number,headRefName,labels \
              --jq "[.[] | select(
                .headRefName == \"feature/issue-${ISSUE_N}\" and
                (.labels | map(.name) | any(startswith(\"review-retry-\") or . == \"needs-human-review\") | not)
              )] | first // empty")
          fi
          if [ -z "$PR_DATA" ] || [ "$PR_DATA" = "null" ]; then
            exit 0
          fi
          PR_NUMBER=$(echo "$PR_DATA" | jq -r '.number')
          HEAD_BRANCH=$(echo "$PR_DATA" | jq -r '.headRefName')
          GH_TOKEN="$GH_DISPATCH_TOKEN" gh workflow run code-review.yml \
            --repo strata-reports-ai/web-strata-reports --ref main \
            -f pr_number="$PR_NUMBER" \
            -f head_branch="$HEAD_BRANCH"
