name: Deploy Web to Azure Static Web Apps

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch/ref to deploy'
        required: false
        default: 'main'
      pr_number:
        description: 'PR number to merge after tests pass'
        required: false
        default: ''
      orchestrator_issue:
        description: 'Orchestrator issue number'
        required: false
        default: ''

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref_name }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - run: npm install

      - run: npm run build

      - uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: /
          output_location: dist
          skip_api_build: true

      - name: Trigger test agent
        env:
          GH_TOKEN: ${{ secrets.GH_DISPATCH_TOKEN }}
          GH_DISPATCH_TOKEN: ${{ secrets.GH_DISPATCH_TOKEN }}
          INPUT_PR_NUMBER: ${{ inputs.pr_number }}
          INPUT_ORCHESTRATOR_ISSUE: ${{ inputs.orchestrator_issue }}
        run: |
          if [ -n "$INPUT_PR_NUMBER" ]; then
            PR_NUMBER="$INPUT_PR_NUMBER"
            ORCHESTRATOR_ISSUE="$INPUT_ORCHESTRATOR_ISSUE"
            MERGE_AFTER_TEST="true"
          else
            PR_NUMBER=$(gh pr list --repo strata-reports-ai/web-strata-reports \
              --base main --state merged --limit 5 \
              --json number,mergeCommit \
              --jq "[.[] | select(.mergeCommit.oid == \"${{ github.sha }}\")] | .[0].number // empty" \
              2>/dev/null || true)
            if [ -z "$PR_NUMBER" ]; then
              echo "No merged PR found for this push — skipping test agent"
              exit 0
            fi
            ORCHESTRATOR_ISSUE=$(gh pr view "$PR_NUMBER" --repo strata-reports-ai/web-strata-reports \
              --json body --jq '.body' \
              | grep -oP 'orchestrator-strata-reports#\K[0-9]+' | head -1 || true)
            MERGE_AFTER_TEST="false"
          fi
          jq -n \
            --arg pr "$PR_NUMBER" \
            --arg issue "${ORCHESTRATOR_ISSUE:-}" \
            --arg merge "$MERGE_AFTER_TEST" \
            '{"ref":"main","inputs":{"pr_numbers":$pr,"target_repo":"web-strata-reports","orchestrator_issues":$issue,"merge_after_test":$merge}}' | \
          gh api repos/strata-reports-ai/fn-strata-reports/actions/workflows/test-agent.yml/dispatches \
            --method POST --input -
          echo "Triggered test agent for web PR #$PR_NUMBER (merge_after_test=$MERGE_AFTER_TEST)"
