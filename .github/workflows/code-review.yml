name: "Code Review Agent"
on:
  pull_request:
    types: [opened, synchronize]
    branches: [main]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to review'
        required: true
        type: string
      head_branch:
        description: 'Head branch of the PR'
        required: true
        type: string
jobs:
  trigger-review:
    if: >-
      (github.event_name == 'pull_request' && startsWith(github.head_ref, 'feature/issue-')) ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1
      - name: Dispatch review to Claude Code Agent (fn repo hosts the review agent)
        env:
          GH_TOKEN: ${{ github.token }}
          GH_DISPATCH_TOKEN: ${{ secrets.GH_DISPATCH_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.inputs.pr_number }}
          HEAD_BRANCH: ${{ github.head_ref || github.event.inputs.head_branch }}
          GITHUB_REPOSITORY: strata-reports-ai/web-strata-reports
        run: |
          cat > /tmp/review-prompt.txt << ENDPROMPT
          You are a code reviewer for a React/TypeScript frontend. Execute these steps in order. You MUST run the commands in step 4 or 5 before finishing.

          STEP 1 — Get the PR diff:
            GH_TOKEN="\$GH_DISPATCH_TOKEN" gh pr diff ${PR_NUMBER} --repo strata-reports-ai/web-strata-reports

          STEP 2 — Read only the files that appear in the diff output.

          STEP 3 — Check ONLY the code introduced by this PR for:
            MAJOR: XSS vulnerabilities, exposed secrets/tokens, broken auth flows, data loss
            MODERATE: significant React/TypeScript bugs, missing error states, accessibility blockers
            (Ignore minor style issues — they do not block merge)

          STEP 4 — If NO major or moderate issues found, run ALL of these commands in order:

            GH_TOKEN="\$GH_DISPATCH_TOKEN" gh pr comment ${PR_NUMBER} --repo strata-reports-ai/web-strata-reports --body "✅ **Code review passed.** No major or moderate issues found. Deploying to dev for testing."

            GH_TOKEN="\$GH_REVIEW_TOKEN" gh pr review ${PR_NUMBER} --repo strata-reports-ai/web-strata-reports --approve --body "Code review passed." 2>/dev/null || true

            ISSUE_N=\$(GH_TOKEN="\$GH_DISPATCH_TOKEN" gh pr view ${PR_NUMBER} --repo strata-reports-ai/web-strata-reports --json body --jq '.body' | grep -oP 'orchestrator-strata-reports#\K[0-9]+' | head -1)
            if [ -n "\$ISSUE_N" ]; then
              GH_TOKEN="\$GH_DISPATCH_TOKEN" gh issue edit "\$ISSUE_N" --repo strata-reports-ai/orchestrator-strata-reports --remove-label code-review --add-label in-test
            fi

            jq -n --arg pr "${PR_NUMBER}" --arg issue "\${ISSUE_N:-}" --arg ref "${HEAD_BRANCH}" \
              '{"ref":"main","inputs":{"ref":\$ref,"pr_number":\$pr,"orchestrator_issue":\$issue}}' | \
            GH_TOKEN="\$GH_DISPATCH_TOKEN" gh api \
              repos/strata-reports-ai/web-strata-reports/actions/workflows/deploy-web.yml/dispatches \
              --method POST --input -

          STEP 5 — If major or moderate issues exist, run ALL of these commands in order:

            RETRIES=\$(GH_TOKEN="\$GH_DISPATCH_TOKEN" gh pr view ${PR_NUMBER} --repo strata-reports-ai/web-strata-reports --json labels --jq '[.labels[].name | select(startswith("review-retry-"))] | length')
            if [ "\$RETRIES" -ge 3 ]; then
              GH_TOKEN="\$GH_DISPATCH_TOKEN" gh pr edit ${PR_NUMBER} --repo strata-reports-ai/web-strata-reports --add-label "needs-human-review"
              GH_TOKEN="\$GH_DISPATCH_TOKEN" gh pr comment ${PR_NUMBER} --repo strata-reports-ai/web-strata-reports --body "⚠️ Max revision cycles reached. Human review required."
              ISSUE_N=\$(GH_TOKEN="\$GH_DISPATCH_TOKEN" gh pr view ${PR_NUMBER} --repo strata-reports-ai/web-strata-reports --json body --jq '.body' | grep -oP 'orchestrator-strata-reports#\K[0-9]+' | head -1)
              if [ -n "\$ISSUE_N" ]; then
                GH_TOKEN="\$GH_DISPATCH_TOKEN" gh issue edit "\$ISSUE_N" --repo strata-reports-ai/orchestrator-strata-reports --remove-label code-review --add-label in-progress 2>/dev/null || true
              fi
            else
              NEXT=\$((RETRIES + 1))
              GH_TOKEN="\$GH_DISPATCH_TOKEN" gh pr edit ${PR_NUMBER} --repo strata-reports-ai/web-strata-reports --add-label "review-retry-\$NEXT"
              ISSUE_N=\$(GH_TOKEN="\$GH_DISPATCH_TOKEN" gh pr view ${PR_NUMBER} --repo strata-reports-ai/web-strata-reports --json body --jq '.body' | grep -oP 'orchestrator-strata-reports#\K[0-9]+' | head -1)
              if [ -n "\$ISSUE_N" ]; then
                GH_TOKEN="\$GH_DISPATCH_TOKEN" gh issue edit "\$ISSUE_N" --repo strata-reports-ai/orchestrator-strata-reports --remove-label code-review --add-label in-progress
              fi
              GH_TOKEN="\$GH_DISPATCH_TOKEN" gh pr comment ${PR_NUMBER} --repo strata-reports-ai/web-strata-reports --body "## Review findings (attempt \$NEXT/3)

          [replace with specific findings: file path, line number, issue, fix required]"
              ORIGINAL=\$(GH_TOKEN="\$GH_DISPATCH_TOKEN" gh pr view ${PR_NUMBER} --repo strata-reports-ai/web-strata-reports --json body --jq '.body')
              jq -n --arg p "REVISION REQUEST for ${HEAD_BRANCH} (attempt \$NEXT/3).

          Original task: \$ORIGINAL

          Review feedback: [replace with specific findings]

          Push fixes to the EXISTING branch ${HEAD_BRANCH}. Do NOT create a new branch.

          After pushing all fixes, trigger a re-review:
            GH_TOKEN=\"\$GH_DISPATCH_TOKEN\" gh workflow run code-review.yml --repo strata-reports-ai/web-strata-reports --field pr_number=${PR_NUMBER} --field head_branch=${HEAD_BRANCH}" \
                    --arg b "${HEAD_BRANCH}" \
                    '{"ref":"main","inputs":{"prompt":\$p,"branch":\$b}}' | \
                  GH_TOKEN="\$GH_DISPATCH_TOKEN" gh api \
                    repos/strata-reports-ai/web-strata-reports/actions/workflows/claude-code.yml/dispatches \
                    --method POST --input -
            fi
          ENDPROMPT

          jq -n --arg prompt "$(cat /tmp/review-prompt.txt)" --arg branch "main" \
            '{"ref":"main","inputs":{"prompt":$prompt,"branch":$branch}}' | \
          GH_TOKEN="$GH_DISPATCH_TOKEN" gh api \
            repos/strata-reports-ai/fn-strata-reports/actions/workflows/claude-code.yml/dispatches \
            --method POST --input -
