name: Deploy Marketing Site to Azure Static Web Apps

on:
  push:
    branches:
      - main
    paths:
      - 'marketing/**'
      - '.github/workflows/marketing-deploy.yml'
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch/ref to deploy'
        required: false
        default: 'main'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: marketing
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref_name }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - run: npm install

      - run: npm run build

      - name: Lighthouse mobile audit
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: ./marketing/.lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true

      - uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.MARKETING_SWA_DEPLOY_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: marketing
          output_location: dist
          skip_app_build: true
          skip_api_build: true
